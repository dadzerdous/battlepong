<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Pong: Faction War</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff3366; --bg: #0d0d12; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        /* Faction Selection Screen */
        #login-screen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .faction-btn { width: 200px; padding: 20px; margin: 10px; border: 3px solid; border-radius: 12px; cursor: pointer; font-weight: bold; text-align: center; font-size: 1.2rem; }
        #pick-cyan { border-color: var(--cyan); color: var(--cyan); }
        #pick-red { border-color: var(--red); color: var(--red); }

        #ui-top { width: 90%; display: flex; justify-content: space-between; padding: 15px 0; font-family: monospace; }
        canvas { background: #000; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Controls: Small, 2-key width buttons at the bottom corners */
        #control-bar { width: 100%; max-width: 450px; position: relative; height: 120px; margin-top: 10px; }
        .btn { position: absolute; bottom: 20px; width: 70px; height: 70px; background: #222; border: 2px solid #444; border-radius: 10px; 
               display: flex; align-items: center; justify-content: center; font-size: 24px; color: #666; touch-action: none; }
        #btn-left { left: 20px; }
        #btn-right { right: 20px; }
        .btn.active { border-color: white; color: white; background: #333; }

        /* Upgrade Overlay */
        #overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .card { width: 220px; padding: 15px; margin: 8px; background: #1a1a1a; border: 1px solid #00f2ff; border-radius: 8px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>BATTLE PONG</h1>
        <p>CHOOSE YOUR SIDE</p>
        <div id="pick-cyan" class="faction-btn">JOIN CYAN</div>
        <div id="pick-red" class="faction-btn">JOIN RED</div>
    </div>

    <div id="ui-top">
        <div id="faction-label">TEAM: --</div>
        <div>XP: <span id="xp-val">0</span></div>
        <div>LVL: <span id="lvl-val">1</span></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="control-bar">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-right">▶</div>
    </div>

    <div id="overlay">
        <h2>RANK UP: CHOOSE PERK</h2>
        <div id="upgrade-list"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = Math.min(window.innerWidth - 20, 400);
        canvas.height = window.innerHeight * 0.55;

        let gameActive = false;
        let myFaction = 'cyan';
        
        const inputState = { left: false, right: false };
        const game = {
            ball: { x: canvas.width/2, y: canvas.height/2, vx: 3, vy: 3, r: 7 },
            p1: { x: canvas.width/2 - 40, y: canvas.height - 20, w: 80, h: 10, speed: 3, xp: 0, lvl: 1 },
            p2: { x: canvas.width/2 - 40, y: 10, w: 80, h: 10, speed: 3.5 },
            buffer: [],
            stats: { speedMult: 1, xpBonus: 1 }
        };

        // --- FACTION PICKER ---
        document.getElementById('pick-cyan').onclick = () => startGame('cyan');
        document.getElementById('pick-red').onclick = () => startGame('red');

        function startGame(faction) {
            myFaction = faction;
            document.getElementById('faction-label').innerText = "TEAM: " + faction.toUpperCase();
            document.getElementById('faction-label').style.color = faction === 'cyan' ? 'var(--cyan)' : 'var(--red)';
            game.p1.color = faction === 'cyan' ? 'var(--cyan)' : 'var(--red)';
            document.getElementById('login-screen').style.display = 'none';
            gameActive = true;
        }

        // --- FLUID HOLD CONTROLS ---
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); inputState[key] = true; el.classList.add('active'); };
            const end = () => { inputState[key] = false; el.classList.remove('active'); };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        };
        setupBtn('btn-left', 'left');
        setupBtn('btn-right', 'right');

        // Keyboard support
        window.onkeydown = (e) => { 
            if(e.key === "ArrowLeft") inputState.left = true; 
            if(e.key === "ArrowRight") inputState.right = true;
        };
        window.onkeyup = (e) => { 
            if(e.key === "ArrowLeft") inputState.left = false; 
            if(e.key === "ArrowRight") inputState.right = false;
        };

        function update() {
            if (!gameActive) return;

            // Handle "Holding" logic: Add to buffer every frame button is down
            if (inputState.left) game.buffer.push(-1);
            if (inputState.right) game.buffer.push(1);

            // Command Averaging
            if (game.buffer.length > 0) {
                let avg = game.buffer.reduce((a,b) => a+b, 0) / game.buffer.length;
                game.p1.x += avg * (game.p1.speed * game.stats.speedMult);
                game.buffer = [];
            }

            game.p1.x = Math.max(0, Math.min(canvas.width - game.p1.w, game.p1.x));

            // Ball & AI (Same as before but tuned for easier scoring)
            game.ball.x += game.ball.vx;
            game.ball.y += game.ball.vy;
            checkCollision(game.p1);
checkCollision(game.p2);
            if (game.ball.x < 0 || game.ball.x > canvas.width) game.ball.vx *= -1;
            game.p2.x += (game.ball.x - (game.p2.x + game.p2.w/2)) * 0.07; // Nerfed AI slightly

            if (checkCollision(game.p1)) {
                game.p1.xp += Math.floor(5 * game.stats.xpBonus);
                document.getElementById('xp-val').innerText = game.p1.xp;
            }
            checkCollision(game.p2);

            if (game.ball.y < 0) { // SCORE!
                game.p1.lvl++;
                document.getElementById('lvl-val').innerText = game.p1.lvl;
                showUpgrades(); 
            }
            if (game.ball.y > canvas.height) resetBall();
        }

function checkCollision(p) {
    // Check if ball is within horizontal bounds of paddle
    if (game.ball.x + game.ball.r > p.x && game.ball.x - game.ball.r < p.x + p.w) {
        // Check if ball is hitting the vertical plane of the paddle
        if (Math.abs(game.ball.y - p.y) < p.h + game.ball.r) {
            
            // 1. ANGLE MATH: Find how far from the center the ball hit
            // Results in a number between -1 (left edge) and 1 (right edge)
            let hitPoint = (game.ball.x - (p.x + p.w / 2)) / (p.w / 2);
            
            // 2. REFLECT: Flip vertical velocity and apply speed boost
            game.ball.vy *= -1.05; 
            
            // 3. APPLY ANGLE: Set horizontal velocity based on hitPoint
            // Higher multiplier = more aggressive angles
            game.ball.vx = hitPoint * 7; 

            // 4. PREVENT SLIDING: Teleport ball outside the paddle box immediately
            if (p.y < canvas.height / 2) {
                // Top paddle (AI)
                game.ball.y = p.y + p.h + game.ball.r + 1;
            } else {
                // Bottom paddle (Player)
                game.ball.y = p.y - game.ball.r - 1;
            }

            return true;
        }
    }
    return false;
}

        function showUpgrades() {
            gameActive = false;
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';
            const options = [
                { n: "Bigger Paddle", f: () => game.p1.w += 20 },
                { n: "Agility Boost", f: () => game.stats.speedMult += 0.3 },
                { n: "Greed (2x XP)", f: () => game.stats.xpBonus += 1 }
            ];
            options.forEach(opt => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerText = opt.n;
                d.onclick = () => { opt.f(); gameActive = true; document.getElementById('overlay').style.display = 'none'; resetBall(); };
                list.appendChild(d);
            });
            document.getElementById('overlay').style.display = 'flex';
        }

        function resetBall() {
            game.ball.x = canvas.width/2; game.ball.y = canvas.height/2;
            game.ball.vx = (Math.random()-0.5)*5; game.ball.vy = 3;
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = game.p1.color;
            ctx.fillRect(game.p1.x, game.p1.y, game.p1.w, game.p1.h);
            ctx.fillStyle = (myFaction === 'cyan' ? 'var(--red)' : 'var(--cyan)');
            ctx.fillRect(game.p2.x, game.p2.y, game.p2.w, game.p2.h);
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(game.ball.x, game.ball.y, game.ball.r, 0, Math.PI*2); ctx.fill();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
