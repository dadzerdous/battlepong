<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BATTLE PONG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="scanlines"></div>

    <div id="screen-faction" class="screen active">
        <div class="faction-content">
            <div class="title-block">
                <div class="title-eyebrow">⚡ SEASON 1 ⚡</div>
                <h1 class="game-title">BATTLE<br/>PONG</h1>
                <div class="title-sub">ROGUELITE FACTION WAR</div>
            </div>
            <div class="faction-prompt">CHOOSE YOUR FACTION</div>
            <div class="faction-cards">
                <div class="faction-card" id="card-cyan" data-faction="cyan">
                    <div class="faction-glow cyan-glow"></div>
                    <div class="faction-icon">◈</div>
                    <div class="faction-name">CYAN</div>
                    <button class="join-btn cyan-btn">JOIN VANGUARD</button>
                </div>
                <div class="faction-vs">VS</div>
                <div class="faction-card" id="card-red" data-faction="red">
                    <div class="faction-glow red-glow"></div>
                    <div class="faction-icon">◆</div>
                    <div class="faction-name">RED</div>
                    <button class="join-btn red-btn">JOIN DOMINION</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-stats" class="screen">
        <div class="stats-content">
            <h2 class="screen-title">BUILD YOUR FIGHTER</h2>
            <div class="points-remaining">POINTS REMAINING: <span id="points-left">200</span></div>
            <div class="stat-sliders" id="stat-sliders"></div>
            <div class="stat-archetypes">
                <button class="arch-btn" data-arch="cannon">Glass Cannon</button>
                <button class="arch-btn" data-arch="wall">The Wall</button>
                <button class="arch-btn" data-arch="speed">Speedster</button>
            </div>
            <button class="confirm-btn" id="confirm-stats">ENTER THE ARENA →</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="hud-top">
            <div class="hud-side hud-left" id="hud-player">
                <div class="hud-faction-label" id="hud-faction-name">--</div>
                <div class="hud-score" id="score-player">0</div>
                <div class="hud-bars">
                    <div class="bar-row"><div class="bar-track"><div class="bar-fill hp-fill" id="hp-bar"></div></div></div>
                </div>
                <div class="hud-xp-row">XP <span id="xp-val">0</span> · LVL <span id="lvl-val">1</span></div>
            </div>
            <div class="hud-center">
                <div class="round-label">ROUND <span id="round-num">1</span></div>
                <div class="vs-divider">⚡</div>
            </div>
            <div class="hud-side hud-right" id="hud-enemy">
                <div class="hud-faction-label" id="hud-enemy-name">--</div>
                <div class="hud-score" id="score-enemy">0</div>
                <div class="bar-row"><div class="bar-track"><div class="bar-fill hp-fill" id="enemy-hp-bar"></div></div></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-controls">
            <button class="ctrl-btn" id="btn-move-left">◀</button>
            <button class="ctrl-btn ability-ctrl" id="btn-ability">⚡</button>
            <button class="ctrl-btn" id="btn-move-right">▶</button>
        </div>
    </div>

    <div id="screen-upgrade" class="screen">
        <div class="upgrade-content">
            <h2 class="upgrade-title">CHOOSE YOUR POWER</h2>
            <div class="upgrade-cards" id="upgrade-cards"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
