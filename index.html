<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Pong RPG</title>
    <style>
        :root { --neon: #00ffcc; --danger: #ff4444; }
        body { margin: 0; background: #0a0a0c; color: var(--neon); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        #ui-top { width: 100%; max-width: 400px; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        
        canvas { background: #000; border: 2px solid #333; border-radius: 10px; touch-action: none; }

        /* Controls Section */
        #controls { width: 100%; max-width: 400px; display: flex; gap: 10px; padding: 20px; box-sizing: border-box; }
        .btn { flex: 1; height: 80px; background: #1a1a1a; border: 2px solid var(--neon); color: var(--neon); border-radius: 10px; 
               display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--neon); color: #000; }

        /* Upgrade Overlay */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
                    flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .upgrade-card { width: 250px; padding: 15px; margin: 10px; background: #222; border: 1px solid var(--neon); border-radius: 8px; 
                        text-align: center; cursor: pointer; transition: 0.2s; }
        .upgrade-card:hover { background: #333; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-top">
        <div>XP: <span id="xp-val">0</span></div>
        <div>LVL: <span id="lvl-val">1</span></div>
        <div>STREAK: <span id="streak-val">0</span></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-right">▶</div>
    </div>

    <div id="overlay">
        <h2>SELECT UPGRADE</h2>
        <div id="upgrade-list"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = Math.min(window.innerWidth - 20, 400);
        canvas.height = window.innerHeight * 0.5;

        let gameActive = true;
        
        const game = {
            ball: { x: canvas.width/2, y: canvas.height/2, vx: 3, vy: 3, r: 7 },
            p1: { x: canvas.width/2 - 40, y: canvas.height - 25, w: 80, h: 10, speed: 8, xp: 0, lvl: 1 },
            p2: { x: canvas.width/2 - 40, y: 15, w: 80, h: 10, speed: 3.5 },
            buffer: [],
            stats: { paddleMult: 1, speedMult: 1, luck: 1 }
        };

        // --- UPGRADE OPTIONS ---
        const upgrades = [
            { name: "Wider Paddle", effect: () => { game.p1.w += 15; } },
            { name: "Turbo Speed", effect: () => { game.stats.speedMult += 0.2; } },
            { name: "Extra XP Gain", effect: () => { game.stats.luck += 0.5; } },
            { name: "Ball Gravity", effect: () => { game.ball.r += 2; } }
        ];

        // --- INPUTS ---
        const addInput = (dir) => { if(gameActive) game.buffer.push(dir); };
        document.getElementById('btn-left').onmousedown = () => addInput(-1);
        document.getElementById('btn-right').onmousedown = () => addInput(1);
        document.getElementById('btn-left').ontouchstart = (e) => { e.preventDefault(); addInput(-1); };
        document.getElementById('btn-right').ontouchstart = (e) => { e.preventDefault(); addInput(1); };

        function showUpgrades() {
            gameActive = false;
            const container = document.getElementById('upgrade-list');
            container.innerHTML = '';
            const shuffled = upgrades.sort(() => 0.5 - Math.random()).slice(0, 3);
            
            shuffled.forEach(up => {
                const div = document.createElement('div');
                div.className = 'upgrade-card';
                div.innerText = up.name;
                div.onclick = () => {
                    up.effect();
                    gameActive = true;
                    document.getElementById('overlay').style.display = 'none';
                    resetBall();
                };
                container.appendChild(div);
            });
            document.getElementById('overlay').style.display = 'flex';
        }

        function update() {
            if (!gameActive) return;

            // Command Averaging
            if (game.buffer.length > 0) {
                let avg = game.buffer.reduce((a,b) => a+b, 0) / game.buffer.length;
                game.p1.x += avg * (game.p1.speed * game.stats.speedMult);
                game.buffer = [];
            }

            game.p1.x = Math.max(0, Math.min(canvas.width - game.p1.w, game.p1.x));

            // Ball Physics
            game.ball.x += game.ball.vx;
            game.ball.y += game.ball.vy;
            if (game.ball.x < 0 || game.ball.x > canvas.width) game.ball.vx *= -1;

            // AI (Opponent)
            game.p2.x += (game.ball.x - (game.p2.x + game.p2.w/2)) * 0.1;

            // Collisions
            if (checkCollision(game.p1)) {
                game.p1.xp += Math.floor(5 * game.stats.luck);
                document.getElementById('xp-val').innerText = game.p1.xp;
            }
            checkCollision(game.p2);

            // Scoring
            if (game.ball.y < 0) { 
                game.p1.lvl++;
                document.getElementById('lvl-val').innerText = game.p1.lvl;
                showUpgrades(); 
            }
            if (game.ball.y > canvas.height) resetBall();
        }

        function checkCollision(p) {
            if (game.ball.x > p.x && game.ball.x < p.x + p.w && 
                Math.abs(game.ball.y - p.y) < p.h) {
                game.ball.vy *= -1.05;
                return true;
            }
            return false;
        }

        function resetBall() {
            game.ball.x = canvas.width / 2;
            game.ball.y = canvas.height / 2;
            game.ball.vx = (Math.random() - 0.5) * 6;
            game.ball.vy = 3;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.fillRect(game.p1.x, game.p1.y, game.p1.w, game.p1.h);
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(game.p2.x, game.p2.y, game.p2.w, game.p2.h);
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(game.ball.x, game.ball.y, game.ball.r, 0, Math.PI*2); ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
